<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yogic Jump Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --accent-color: #c8a96e;
            --text-color: #ffffff;
            --muted-color: #666666;
            --sensing-color: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            padding: 2rem;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--accent-color);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--muted-color);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 2rem;
            width: 100%;
            max-width: 300px;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted-color);
        }

        input[type="number"] {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--text-color);
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            width: 150px;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            margin-top: 0.5rem;
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-bottom: 1rem;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        button.secondary {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        button.danger {
            background-color: transparent;
            color: #ff4444;
            border: 2px solid #ff4444;
        }

        /* Counter Screen UI */
        .top-bar {
            position: absolute;
            top: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .jump-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            background: transparent;
        }

        .jump-dot.filled {
            background: var(--accent-color);
        }

        .cycle-counter {
            font-family: 'Space Mono', monospace;
            font-size: 6rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 2rem 0;
            transition: transform 0.1s ease-out;
        }

        .pulse {
            animation: pulse-anim 0.3s ease-out;
        }

        @keyframes pulse-anim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .live-force {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--muted-color);
            margin-bottom: 2rem;
        }

        .sensing-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .sensing-dot {
            width: 10px;
            height: 10px;
            background-color: var(--sensing-color);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .sensing-text {
            font-size: 0.9rem;
            color: var(--sensing-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0 2rem;
        }

        .controls button {
            margin: 0;
            width: 140px;
        }

    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>Yogic Practice</h1>
        
        <div class="input-group">
            <label>Target Cycles (1 = 2 jumps)</label>
            <input type="number" id="goal-input" value="108" min="1">
        </div>

        <div class="input-group">
            <label>Jump Sensitivity: <span id="sens-val">5.0</span></label>
            <input type="range" id="sensitivity" min="2" max="15" step="0.5" value="5.0" oninput="document.getElementById('sens-val').innerText = parseFloat(this.value).toFixed(1)">
        </div>

        <button onclick="requestPermissionsAndStart()">Start Practice</button>
    </div>

    <div id="counter-screen" class="screen">
        <div class="sensing-container">
            <div class="sensing-dot"></div>
            <div class="sensing-text">Sensing</div>
        </div>
        
        <div class="top-bar">
            <div class="jump-dot" id="dot-1"></div>
            <div class="jump-dot" id="dot-2"></div>
        </div>

        <div class="cycle-counter" id="cycle-display">0</div>
        <div class="live-force">Force: <span id="live-force-display">0.00</span></div>

        <div class="controls">
            <button class="secondary" onclick="resetCounter()">Reset</button>
            <button class="danger" onclick="stopPractice()">Stop</button>
        </div>
    </div>

    <div id="done-screen" class="screen">
        <h1>Goal Reached!</h1>
        <p>You have completed your practice.</p>
        <div class="cycle-counter" id="final-score">108</div>
        <button onclick="resetApp()">Home</button>
    </div>

    <script>
        // App State
        let goal = 108;
        let cycles = 0;
        let currentJumps = 0;
        let threshold = 5.0;
        let inImpact = false;
        let lastJumpTime = 0;
        let appState = 'idle'; // idle, counting
        
        // Features
        let wakeLock = null;
        const speechTargets = [3, 7, 12, 21, 24, 33, 48, 64, 84, 96, 108];

        // Initialization
        window.onload = () => {
            // Load saved threshold if it exists
            const savedThreshold = localStorage.getItem('jumpThresholdV1');
            if (savedThreshold) {
                document.getElementById('sensitivity').value = savedThreshold;
                document.getElementById('sens-val').innerText = parseFloat(savedThreshold).toFixed(1);
            }
        };

        // Screen Navigation
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Permissions & Startup (Triggered by user click)
        async function requestPermissionsAndStart() {
            goal = parseInt(document.getElementById('goal-input').value) || 108;
            threshold = parseFloat(document.getElementById('sensitivity').value);
            
            // Save sensitivity for next time
            localStorage.setItem('jumpThresholdV1', threshold.toString());
            
            // Unlock Speech Synthesis
            const utterance = new SpeechSynthesisUtterance('');
            speechSynthesis.speak(utterance);

            // Request WakeLock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('WakeLock error:', err);
            }

            // iOS 13+ DeviceMotion Permission
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        startCounting();
                    } else {
                        alert("Motion access denied. App cannot function.");
                    }
                } catch (console) {
                    alert("Error requesting motion permissions.");
                }
            } else {
                startCounting();
            }
        }

        function startCounting() {
            appState = 'counting';
            cycles = 0;
            currentJumps = 0;
            inImpact = false;
            lastJumpTime = Date.now();
            updateCounterUI();
            
            // Attach motion listener
            window.addEventListener('devicemotion', handleMotion);
            switchScreen('counter-screen');
        }

        // Core Motion Logic (Absolute Magnitude)
        function handleMotion(event) {
            if (appState !== 'counting') return;

            // Fallback to accelerationIncludingGravity if pure acceleration isn't available
            const acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            const x = acc.x || 0;
            const y = acc.y || 0;
            const z = acc.z || 0;

            // Calculate total vector magnitude
            const magnitude = Math.sqrt(x*x + y*y + z*z);
            
            // Remove gravity baseline (~9.81 m/s^2) if using the combined sensor
            const isIncludingGravity = event.acceleration == null;
            const netForce = isIncludingGravity ? Math.abs(magnitude - 9.81) : magnitude;
            
            const now = Date.now();

            // Display live force so user can see if they need to adjust the slider
            document.getElementById('live-force-display').innerText = netForce.toFixed(2);

            // Jump Triggered
            if (netForce > threshold && !inImpact && (now - lastJumpTime > 500)) {
                inImpact = true;
                lastJumpTime = now;
                registerJump();
            }
            
            // Reset impact flag when force drops well below threshold
            if (inImpact && netForce < (threshold * 0.4)) {
                inImpact = false;
            }
        }

        function registerJump() {
            currentJumps++;
            
            if (currentJumps === 1) {
                document.getElementById('dot-1').classList.add('filled');
            } else if (currentJumps === 2) {
                cycles++;
                currentJumps = 0;
                
                // UI Updates
                document.getElementById('dot-1').classList.remove('filled');
                document.getElementById('dot-2').classList.remove('filled');
                
                const display = document.getElementById('cycle-display');
                display.innerText = cycles;
                display.classList.remove('pulse');
                void display.offsetWidth; // trigger reflow
                display.classList.add('pulse');

                checkSpeech();

                if (cycles >= goal) {
                    finishPractice();
                }
            }
        }

        function checkSpeech() {
            if (speechTargets.includes(cycles)) {
                const utterance = new SpeechSynthesisUtterance(cycles.toString());
                speechSynthesis.speak(utterance);
            }
        }

        function resetCounter() {
            cycles = 0;
            currentJumps = 0;
            updateCounterUI();
        }

        function updateCounterUI() {
            document.getElementById('cycle-display').innerText = cycles;
            document.getElementById('dot-1').classList.toggle('filled', currentJumps >= 1);
            document.getElementById('dot-2').classList.toggle('filled', currentJumps >= 2);
        }

        function stopPractice() {
            appState = 'idle';
            window.removeEventListener('devicemotion', handleMotion);
            releaseWakeLock();
            switchScreen('setup-screen');
        }

        function finishPractice() {
            appState = 'idle';
            window.removeEventListener('devicemotion', handleMotion);
            releaseWakeLock();
            document.getElementById('final-score').innerText = cycles;
            switchScreen('done-screen');
        }

        function resetApp() {
            cycles = 0;
            currentJumps = 0;
            switchScreen('setup-screen');
        }

        async function releaseWakeLock() {
            if (wakeLock !== null) {
                await wakeLock.release();
                wakeLock = null;
            }
        }
    </script>
</body>
</html>
